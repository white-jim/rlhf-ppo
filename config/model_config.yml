model_name: "THU-KEG/WildReward-8B"
model_path: "models/wildreward-8b"
tokenizer_path: "models/wildreward-8b"

device: "cuda"
dtype: "bfloat16"

# device_map for each model component.
# Use "auto" to let HuggingFace decide, or specify a single device like "cuda:0",
# or a layer-level dict like {"": "cuda:0", "lm_head": "cuda:1"}.
device_maps:
  actor_critic: "cuda:3"
  reference_model: "cuda:3"

max_seq_len: 1024
max_new_tokens: 512

temperature: 0.7
top_p: 0.9
top_k: 50

use_gradient_checkpointing: true

datasets:
  coig_cqia:
    name: "m-a-p/COIG-CQIA"
    configs: ["zhihu", "douban", "wikihow", "wiki", "segmentfault"]
    raw_dir: "data/coig-cqia/raw"
    processed_dir: "data/coig-cqia/processed"
    train_path: "data/coig-cqia/processed/train.jsonl"
    val_path: "data/coig-cqia/processed/val.jsonl"
    prompt_template: "User: {prompt}\nAssistant:"
    response_template: "{response}"
  ultrafeedback:
    name: "hiyouga/ultrafeedback_binarized"
    raw_dir: "data/ultrafeedback/raw"
    processed_dir: "data/ultrafeedback/processed"
    train_path: "data/ultrafeedback/processed/train.jsonl"
    val_path: "data/ultrafeedback/processed/val.jsonl"
    prompt_template: "User: {prompt}\nAssistant:"
    response_template: "{response}"
  hh_rlhf:
    name: "Anthropic/hh-rlhf"
    raw_dir: "data/hh-rlhf/raw"
    processed_dir: "data/hh-rlhf/processed"
    train_path: "data/hh-rlhf/processed/train.jsonl"
    val_path: "data/hh-rlhf/processed/val.jsonl"
    prompt_template: "User: {prompt}\nAssistant:"
    response_template: "{response}"
  current_dataset: "coig_cqia"

lora:
  enable: true
  r: 8
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
